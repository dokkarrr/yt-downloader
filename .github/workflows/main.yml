name: Quick Manual Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube URL'
        required: true
        type: string
      format:
        description: 'Format'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio)
          - srt (subtitles)

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp
      
      - name: Download
        run: |
          if [ "${{ inputs.format }}" = "mp4" ]; then
            yt-dlp -f 'bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best' \
                   -o "downloads/%(title)s.%(ext)s" \
                   "${{ inputs.url }}"
          elif [ "${{ inputs.format }}" = "mp3" ]; then
            yt-dlp -f bestaudio --extract-audio --audio-format mp3 \
                   -o "downloads/%(title)s.%(ext)s" \
                   "${{ inputs.url }}"
          else
            yt-dlp --write-subs --sub-lang en --skip-download \
                   -o "downloads/%(title)s.%(ext)s" \
                   "${{ inputs.url }}"
          fi
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-content
          path: downloads/
          retention-days: 7
